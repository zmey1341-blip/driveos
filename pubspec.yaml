name: driveos
description: Advanced in-car infotainment system for automotive applications.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Device
  geolocator: ^9.0.0
  permission_handler: ^11.4.0
  sensors_plus: ^1.4.0
  battery_plus: ^1.4.0
  connectivity_plus: ^5.0.0

  # Audio
  just_audio: ^0.9.32
  audio_session: ^0.1.16

  # USB/Serial
  usb_serial: ^0.9.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  get_it: ^7.6.0
  logger: ^2.0.0
  freezed_annotation: ^2.4.0

  # UI
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  lottie: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0
  freezed: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
